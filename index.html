<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Marketing Auditor - Cocoon Restaurant System</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        @media print {
            body { background-color: white !important; }
            .no-print { display: none !important; }
            .print-container { width: 100% !important; margin: 0 !important; padding: 0 !important; }
            .audit-card { box-shadow: none !important; border: 1px solid #e2e8f0 !important; break-inside: avoid; }
            @page { margin: 1.5cm; size: A4; }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // --- UI Icons ---
        const IconSparkles = () => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/></svg>);
        const IconLoader = () => (<svg className="animate-spin w-10 h-10 text-indigo-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>);
        const IconPrinter = () => (<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><path d="M6 9V2h12v7"/><rect x="6" y="14" width="12" height="8" rx="1"/></svg>);

        const App = () => {
            const [step, setStep] = useState('input');
            const [formData, setFormData] = useState({ brandName: '', website: '', facebook: '', description: '' });
            const [auditResult, setAuditResult] = useState(null);
            const [loading, setLoading] = useState(false);

            const callAI = async () => {
                setLoading(true);
                const apiKey = "DÁN_KEY_TẠI_ĐÂY"; // QUAN TRỌNG: Dán API Key vào đây
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`;
                
                const prompt = `Bạn là Giám đốc Marketing (CMO). Đánh giá Digital Marketing cho: ${formData.brandName}. Web: ${formData.website}, FB: ${formData.facebook}. Hãy trả về JSON có cấu trúc: {brandName, overallScore, totalCriteria, passed, failed, strategicNote, categories: [{name, items: [{label, status: "PASS"|"FAIL"|"WARNING", comment}]}]}`;

                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], generationConfig: { responseMimeType: "application/json" } })
                    });
                    const data = await response.json();
                    const result = JSON.parse(data.candidates[0].content.parts[0].text);
                    setAuditResult(result);
                    setStep('result');
                } catch (e) {
                    alert("Lỗi kết nối AI. Vui lòng kiểm tra API Key.");
                } finally {
                    setLoading(false);
                }
            };

            if (loading) return (
                <div className="min-h-screen flex flex-col items-center justify-center bg-white p-10 text-center">
                    <IconLoader />
                    <h2 className="mt-6 text-2xl font-black text-slate-900 uppercase">AI đang phân tích dữ liệu...</h2>
                </div>
            );

            return (
                <div className="min-h-screen">
                    {step === 'input' ? (
                        <div className="max-w-xl mx-auto pt-20 px-6 fade-in">
                            <div className="text-center mb-10">
                                <div className="inline-flex p-4 bg-indigo-600 rounded-3xl mb-6 shadow-xl text-white"><IconSparkles /></div>
                                <h1 className="text-3xl font-black text-slate-900">AI Marketing Auditor</h1>
                                <p className="text-slate-500 mt-2 font-medium">Nhập thông tin để nhận chiến lược từ CMO AI</p>
                            </div>
                            <div className="bg-white p-8 rounded-[2.5rem] shadow-2xl border border-slate-100 space-y-6">
                                <input className="w-full px-6 py-4 rounded-2xl bg-slate-50 border-2 border-transparent focus:border-indigo-500 outline-none font-semibold" placeholder="Tên thương hiệu *" onChange={e => setFormData({...formData, brandName: e.target.value})} />
                                <div className="grid grid-cols-2 gap-4">
                                    <input className="px-6 py-4 rounded-2xl bg-slate-50 text-sm outline-none" placeholder="Website URL" onChange={e => setFormData({...formData, website: e.target.value})} />
                                    <input className="px-6 py-4 rounded-2xl bg-slate-50 text-sm outline-none" placeholder="Facebook URL" onChange={e => setFormData({...formData, facebook: e.target.value})} />
                                </div>
                                <textarea className="w-full px-6 py-4 rounded-2xl bg-slate-50 h-28 text-sm outline-none" placeholder="Bối cảnh kinh doanh..." onChange={e => setFormData({...formData, description: e.target.value})} />
                                <button onClick={callAI} className="w-full bg-slate-900 text-white py-5 rounded-2xl font-black uppercase tracking-widest hover:bg-indigo-600 transition-all">Bắt đầu Audit AI</button>
                            </div>
                        </div>
                    ) : (
                        <div className="max-w-5xl mx-auto py-12 px-6 print-container fade-in">
                            <div className="flex justify-between mb-8 no-print">
                                <button onClick={() => setStep('input')} className="font-bold text-xs text-indigo-600">← QUAY LẠI</button>
                                <button onClick={() => window.print()} className="bg-indigo-600 text-white px-6 py-3 rounded-xl font-bold text-xs flex items-center gap-2"><IconPrinter /> XUẤT BÁO CÁO (PDF)</button>
                            </div>
                            <div className="bg-[#0B1C3E] text-white p-10 rounded-t-[3rem] flex justify-between items-center audit-card shadow-2xl">
                                <div><h1 className="text-4xl font-black uppercase">{auditResult.brandName}</h1><p className="text-slate-400 text-[10px] mt-2 tracking-[0.3em]">AUDIT REPORT 2024</p></div>
                                <div className="text-right border-l border-slate-700 pl-10"><div className="text-7xl font-black text-[#FF6B00]">{auditResult.overallScore}%</div><p className="text-[9px] font-black text-slate-300">SỨC KHỎE THƯƠNG HIỆU</p></div>
                            </div>
                            <div className="grid grid-cols-3 gap-4 mt-8">
                                {[{l:'TỔNG',v:auditResult.totalCriteria,c:'border-slate-300'},{l:'ĐẠT',v:auditResult.passed,c:'border-emerald-500',t:'text-emerald-600'},{l:'CHƯA ĐẠT',v:auditResult.failed,c:'border-rose-500',t:'text-rose-600'}].map((card, i) => (
                                    <div key={i} className={`p-8 bg-white rounded-[2rem] border-t-[10px] ${card.c} shadow-md audit-card`}><p className="text-[10px] font-black text-slate-400">{card.l}</p><p className={`text-5xl font-black mt-4 ${card.t}`}>{card.v}</p></div>
                                ))}
                            </div>
                            <div className="bg-white mt-10 rounded-[2.5rem] shadow-xl overflow-hidden audit-card">
                                <table className="w-full text-left">
                                    <thead><tr className="text-[10px] font-black text-slate-400 uppercase bg-slate-50 border-b"><th className="p-8">DANH MỤC</th><th className="p-8 text-center">TRẠNG THÁI</th><th className="p-8">NHẬN XÉT</th></tr></thead>
                                    <tbody>
                                        {auditResult.categories.map((cat, idx) => (
                                            <React.Fragment key={idx}>
                                                <tr className="bg-slate-50/50"><td colSpan="3" className="px-8 py-4 text-[11px] font-black text-indigo-900 border-b">{cat.name}</td></tr>
                                                {cat.items.map((item, i) => (
                                                    <tr key={i} className="border-b"><td className="p-8 font-bold text-sm text-slate-800">{item.label}</td><td className="p-8 text-center text-[10px] font-black">{item.status}</td><td className="p-8 text-xs text-slate-500 italic">"{item.comment}"</td></tr>
                                                ))}
                                            </React.Fragment>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
