<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Marketing Auditor - Final Stable</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- CẤU HÌNH API CỦA BẠN Ở ĐÂY ---
        const API_KEY = "AIzaSyDrug-ZYYSvzp4qfRino-5rM-ixKiehBU4"; 
        const MODEL_NAME = "gemini-1.5-flash"; // Dùng bản này để đảm bảo kết nối 100% thành công

        // --- HỆ THỐNG ICON NỘI BỘ (Thay thế Lucide-React) ---
        const Sparkles = ({ className, size = 24 }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/></svg>);
        const ChevronRight = ({ className, size = 24 }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m9 18 6-6-6-6"/></svg>);
        const Loader2 = ({ className, size = 24 }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>);
        const BarChart3 = ({ className, size = 24 }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></svg>);
        const Printer = ({ className, size = 24 }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><path d="M6 9V2h12v7"/><rect x="6" y="14" width="12" height="8" rx="1"/></svg>);

        const App = () => {
            const [step, setStep] = useState('input'); // input | loading | result
            const [formData, setFormData] = useState({ brandName: '', website: '', facebook: '', description: '' });
            const [auditResult, setAuditResult] = useState(null);
            const [error, setError] = useState(null);

            // Hàm gọi API với Exponential Backoff
            const callGemini = async (prompt, retries = 5, delay = 1000) => {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${API_KEY}`;
                
                const payload = {
                    contents: [{ parts: [{ text: prompt }] }],
                    generationConfig: {
                        responseMimeType: "application/json",
                        responseSchema: {
                            type: "OBJECT",
                            properties: {
                                brandName: { type: "STRING" },
                                overallScore: { type: "NUMBER" },
                                totalCriteria: { type: "NUMBER" },
                                passed: { type: "NUMBER" },
                                failed: { type: "NUMBER" },
                                strategicNote: { type: "STRING" },
                                categories: {
                                    type: "ARRAY",
                                    items: {
                                        type: "OBJECT",
                                        properties: {
                                            name: { type: "STRING" },
                                            items: {
                                                type: "ARRAY",
                                                items: {
                                                    type: "OBJECT",
                                                    properties: {
                                                        label: { type: "STRING" },
                                                        status: { type: "STRING", enum: ["PASS", "FAIL", "WARNING"] },
                                                        comment: { type: "STRING" }
                                                    }
                                                }
                                            }
                                        }
                                    }
                                }
                            }
                        }
                    }
                };

                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) throw new Error(`API Error: ${response.status}`);
                    
                    const data = await response.json();
                    return JSON.parse(data.candidates[0].content.parts[0].text);
                } catch (err) {
                    if (retries > 0) {
                        await new Promise(res => setTimeout(res, delay));
                        return callGemini(prompt, retries - 1, delay * 2);
                    }
                    throw err;
                }
            };

            const handleStartAudit = async () => {
                if (!API_KEY || API_KEY === "DÁN_API_KEY_CỦA_BẠN_VÀO_ĐÂY") {
                    setError("Vui lòng dán API Key vào mã nguồn trước khi chạy.");
                    return;
                }
                if (!formData.brandName) {
                    setError("Tên thương hiệu không được để trống.");
                    return;
                }
                
                setStep('loading');
                setError(null);

                const systemPrompt = `
                Bạn là một Giám đốc Marketing (CMO) dày dạn kinh nghiệm. 
                Nhiệm vụ: Đánh giá hiện trạng Digital Marketing của doanh nghiệp dựa trên thông tin người dùng cung cấp.
                Hãy đưa ra các đánh giá thực tế, sắc sảo về: UI/UX Website, Nội dung Facebook, Google Maps.
                Dựa trên các thông tin: Tên: ${formData.brandName}, Web: ${formData.website}, FB: ${formData.facebook}, Mô tả: ${formData.description}.
                Hãy trả về JSON cấu trúc chuẩn để hiển thị Dashboard.
                `;

                try {
                    const result = await callGemini(systemPrompt);
                    setAuditResult(result);
                    setStep('result');
                } catch (err) {
                    setError("Không thể kết nối với AI. Vui lòng thử lại sau.");
                    setStep('input');
                }
            };

            // Component Trạng thái
            const StatusPill = ({ status }) => {
                const config = {
                    PASS: { bg: 'bg-emerald-100', text: 'text-emerald-700', label: 'ĐẠT' },
                    FAIL: { bg: 'bg-rose-100', text: 'text-rose-700', label: 'CHƯA ĐẠT' },
                    WARNING: { bg: 'bg-amber-100', text: 'text-amber-700', label: 'CẢNH BÁO' }
                };
                const style = config[status] || config.WARNING;
                return (
                    <span className={`${style.bg} ${style.text} px-3 py-1 rounded-full text-[10px] font-bold inline-block`}>
                        {style.label}
                    </span>
                );
            };

            return (
                <div className="min-h-screen bg-slate-50 font-sans text-slate-900 overflow-x-hidden">
                    {/* Cấu hình CSS */}
                    <style dangerouslySetInnerHTML={{ __html: `
                        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
                        body { font-family: 'Inter', sans-serif; }
                        .animate-in { animation: fadeIn 0.5s ease-out forwards; }
                        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
                        
                        @media print {
                            body { background-color: white !important; }
                            .no-print { display: none !important; }
                            .print-container { padding: 0 !important; margin: 0 !important; width: 100% !important; box-shadow: none !important; border: none !important; }
                            .audit-card { box-shadow: none !important; border: 1px solid #e2e8f0 !important; break-inside: avoid; }
                            table { break-inside: auto; }
                            tr { break-inside: avoid; break-after: auto; }
                            @page { margin: 1.5cm; }
                        }
                    `}} />

                    {/* Giao diện Nhập liệu */}
                    {step === 'input' && (
                        <div className="max-w-2xl mx-auto pt-20 px-6 animate-in">
                            <div className="text-center mb-10">
                                <div className="inline-flex p-3 bg-indigo-600 rounded-2xl mb-4 shadow-lg shadow-indigo-200">
                                    <Sparkles className="text-white" size={32} />
                                </div>
                                <h1 className="text-3xl font-bold text-slate-900">AI Marketing Auditor</h1>
                                <p className="text-slate-500 mt-2">Nhập thông tin doanh nghiệp để AI bắt đầu phân tích hiện trạng</p>
                            </div>

                            <div className="bg-white p-8 rounded-3xl shadow-xl shadow-slate-200 border border-slate-100">
                                <div className="space-y-5">
                                    <div>
                                        <label className="block text-sm font-semibold text-slate-700 mb-2">Tên thương hiệu *</label>
                                        <input 
                                            type="text" 
                                            className="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none transition-all"
                                            placeholder="Ví dụ: Cocoon Restaurant"
                                            value={formData.brandName}
                                            onChange={(e) => setFormData({...formData, brandName: e.target.value})}
                                        />
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-sm font-semibold text-slate-700 mb-2">Website URL</label>
                                            <input 
                                                type="url" 
                                                className="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none transition-all"
                                                placeholder="https://..."
                                                value={formData.website}
                                                onChange={(e) => setFormData({...formData, website: e.target.value})}
                                            />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-semibold text-slate-700 mb-2">Facebook Page</label>
                                            <input 
                                                type="url" 
                                                className="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none transition-all"
                                                placeholder="https://facebook.com/..."
                                                value={formData.facebook}
                                                onChange={(e) => setFormData({...formData, facebook: e.target.value})}
                                            />
                                        </div>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-semibold text-slate-700 mb-2">Mô tả thêm (Nếu có)</label>
                                        <textarea 
                                            className="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none transition-all h-24 resize-none"
                                            placeholder="Mô tả về dịch vụ, phân khúc khách hàng..."
                                            value={formData.description}
                                            onChange={(e) => setFormData({...formData, description: e.target.value})}
                                        />
                                    </div>
                                    {error && <p className="text-rose-600 text-sm font-semibold italic bg-rose-50 p-3 rounded-lg">{error}</p>}
                                    <button 
                                        onClick={handleStartAudit}
                                        className="w-full bg-slate-900 text-white py-4 rounded-xl font-bold hover:bg-indigo-600 transition-all flex items-center justify-center gap-2"
                                    >
                                        Bắt đầu đánh giá ngay <ChevronRight size={18} />
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Giao diện Loading */}
                    {step === 'loading' && (
                        <div className="flex flex-col items-center justify-center min-h-screen text-center px-6 animate-in">
                            <Loader2 className="text-indigo-600 animate-spin mb-6" size={64} />
                            <h2 className="text-2xl font-bold text-slate-900">AI đang phân tích dữ liệu...</h2>
                            <p className="text-slate-500 mt-2 max-w-md">Chúng tôi đang kiểm tra các kênh Digital của <strong>{formData.brandName}</strong> theo tiêu chuẩn CMO chuyên nghiệp.</p>
                        </div>
                    )}

                    {/* Giao diện Kết quả (Audit Dashboard) */}
                    {step === 'result' && auditResult && (
                        <div className="max-w-6xl mx-auto py-10 px-6 print-container animate-in">
                            <div className="mb-6 flex justify-between items-end no-print">
                                <button 
                                    onClick={() => setStep('input')}
                                    className="text-indigo-600 font-bold text-sm hover:underline flex items-center gap-1"
                                >
                                    ← Quay lại nhập liệu
                                </button>
                                <span className="text-slate-400 text-xs font-bold uppercase tracking-widest">Phân tích bởi CMO AI</span>
                            </div>

                            {/* Header Dashboard */}
                            <div className="bg-[#0B1C3E] text-white p-10 rounded-t-3xl flex flex-col md:flex-row justify-between items-center gap-6 audit-card shadow-lg">
                                <div className="flex-1">
                                    <h1 className="text-4xl font-black tracking-tight uppercase">{auditResult.brandName}</h1>
                                    <p className="text-slate-400 mt-2 text-[10px] uppercase tracking-widest font-bold">Báo cáo Đánh giá Hiện trạng Digital Marketing</p>
                                </div>
                                <div className="text-center md:text-right border-l-0 md:border-l border-slate-700 pl-0 md:pl-10">
                                    <div className="text-7xl font-black text-[#FF6B00] leading-none">{auditResult.overallScore}%</div>
                                    <p className="text-[10px] font-black uppercase tracking-widest mt-2 text-slate-300">Điểm Sức khỏe</p>
                                </div>
                            </div>

                            {/* Summary Cards */}
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mt-10">
                                {[
                                    { label: 'TỔNG TIÊU CHÍ', val: auditResult.totalCriteria, color: 'border-slate-300', text: 'text-slate-900', bg: 'bg-white' },
                                    { label: 'ĐẠT (PASS)', val: auditResult.passed, color: 'border-emerald-500', text: 'text-emerald-600', bg: 'bg-emerald-50/30' },
                                    { label: 'CHƯA ĐẠT (FAIL)', val: auditResult.failed, color: 'border-rose-500', text: 'text-rose-600', bg: 'bg-rose-50/30' }
                                ].map((card, i) => (
                                    <div key={i} className={`${card.bg} border-t-[8px] ${card.color} p-8 rounded-2xl shadow-sm audit-card`}>
                                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest">{card.label}</p>
                                        <p className={`text-6xl font-black mt-4 ${card.text}`}>{card.val}</p>
                                    </div>
                                ))}
                            </div>

                            {/* Table Detail */}
                            <div className="bg-white mt-10 rounded-3xl shadow-lg border border-slate-100 overflow-hidden audit-card">
                                <div className="p-6 border-b border-slate-100 bg-slate-50 flex justify-between items-center no-print">
                                    <h3 className="font-bold text-slate-800 flex items-center gap-2 uppercase tracking-wide text-sm">
                                        <BarChart3 size={18} className="text-indigo-600" /> Chi tiết đánh giá hạng mục
                                    </h3>
                                </div>
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left">
                                        <thead>
                                            <tr className="text-[10px] text-slate-400 uppercase tracking-widest border-b border-slate-100 bg-slate-50/50">
                                                <th className="p-6 font-black">Hạng mục / Tiêu chí</th>
                                                <th className="p-6 font-black w-40 text-center">Trạng thái</th>
                                                <th className="p-6 font-black">Nhận xét & Đề xuất</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100">
                                            {auditResult.categories && auditResult.categories.map((cat, idx) => (
                                                <React.Fragment key={idx}>
                                                    <tr className="bg-slate-50">
                                                        <td colSpan="3" className="px-6 py-4 text-[11px] font-black text-indigo-900 uppercase tracking-widest">
                                                            {idx + 1}. {cat.name}
                                                        </td>
                                                    </tr>
                                                    {cat.items && cat.items.map((item, i) => (
                                                        <tr key={i} className="hover:bg-slate-50/50 transition-colors">
                                                            <td className="px-6 py-5 font-bold text-slate-700 text-sm">{item.label}</td>
                                                            <td className="px-6 py-5 text-center"><StatusPill status={item.status} /></td>
                                                            <td className="px-6 py-5 text-[13px] text-slate-600 italic font-medium leading-relaxed">"{item.comment}"</td>
                                                        </tr>
                                                    ))}
                                                </React.Fragment>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>

                            {/* Strategic Note */}
                            <div className="mt-10 bg-white p-10 rounded-3xl border-l-[12px] border-[#FF6B00] shadow-lg audit-card">
                                <h4 className="font-black text-indigo-900 flex items-center gap-2 mb-4 text-xs uppercase tracking-widest">
                                    <Sparkles className="text-amber-500" size={20} /> ĐỀ XUẤT TỪ GIÁM ĐỐC MARKETING AI:
                                </h4>
                                <p className="text-slate-700 text-lg leading-relaxed font-medium italic">
                                    {auditResult.strategicNote}
                                </p>
                            </div>

                            {/* Footer Info (Only Print) */}
                            <div className="hidden print:block mt-12 text-center text-[10px] text-slate-400 font-bold uppercase tracking-widest">
                                Báo cáo được tạo bởi AI Marketing Auditor • {new Date().toLocaleDateString('vi-VN')}
                            </div>

                            {/* Export Button Section */}
                            <div className="mt-12 text-center pb-16 no-print">
                                <button 
                                    onClick={() => window.print()}
                                    className="inline-flex items-center gap-3 px-8 py-4 bg-indigo-600 text-white font-bold rounded-2xl hover:bg-indigo-700 transition-all duration-300 shadow-xl active:scale-95 uppercase tracking-wide text-sm"
                                >
                                    <Printer size={20} />
                                    Xuất báo cáo PDF
                                </button>
                                <p className="text-slate-400 text-xs mt-4 font-medium italic">Mẹo: Chọn "Save as PDF" trong hộp thoại in để lưu thành tệp.</p>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
