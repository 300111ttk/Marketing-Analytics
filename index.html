<div id="report-area" style="display:none; background: white; padding: 20px; border-radius: 8px;">
    <h2 id="resName" style="text-align: center; border-bottom: 2px solid #1a73e8; padding-bottom: 10px;"></h2>
    
    <div style="display: flex; justify-content: space-around; background: #f8f9fa; padding: 15px; border-radius: 8px; margin: 20px 0;">
        <div style="text-align:center;">
            <h1 id="resScore" style="font-size: 48px; color: #1a73e8; margin: 0;">0%</h1>
            <p>SỨC KHỎE MARKETING</p>
        </div>
        <div style="display: flex; flex-direction: column; justify-content: center;">
            <p>✅ ĐẠT: <span id="resPass" style="color: green; font-weight: bold;">0</span></p>
            <p>❌ LỖI: <span id="resFail" style="color: red; font-weight: bold;">0</span></p>
        </div>
    </div>

    <table border="1" style="width: 100%; border-collapse: collapse; margin-bottom: 20px;">
        <thead style="background: #eee;">
            <tr>
                <th style="padding: 10px;">NHÓM</th>
                <th>TIÊU CHÍ</th>
                <th>TRẠNG THÁI</th>
                <th>NHẬN XÉT CHI TIẾT</th>
            </tr>
        </thead>
        <tbody id="resBody"></tbody>
    </table>

    <div style="background: #fff9c4; padding: 15px; border-left: 5px solid #fbc02d;">
        <strong>💡 CHIẾN LƯỢC TỪ CHUYÊN GIA:</strong>
        <p id="resAdvice"></p>
    </div>
</div>
