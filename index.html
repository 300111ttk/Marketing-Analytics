<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billig Global - AI Marketing Auditor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #1a73e8;
            --success-color: #2e7d32;
            --error-color: #c62828;
            --bg-color: #f8f9fa;
        }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-color); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { max-width: 700px; width: 100%; background: #ffffff; padding: 40px; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.08); }
        .header { text-align: center; margin-bottom: 30px; }
        .header h2 { color: var(--primary-color); margin: 0; font-size: 24px; }
        
        .section { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 13px; color: #3c4043; }
        input, textarea { 
            width: 100%; padding: 14px; border: 1px solid #dadce0; border-radius: 8px; 
            box-sizing: border-box; font-size: 15px;
        }
        textarea { min-height: 150px; line-height: 1.5; }

        .api-box { background: #f1f3f4; padding: 15px; border-radius: 8px; border: 1px dashed #bdc1c6; }
        
        button { 
            width: 100%; padding: 16px; background-color: var(--primary-color); color: white; 
            border: none; border-radius: 8px; font-size: 16px; font-weight: 700; 
            cursor: pointer; transition: 0.3s;
        }
        button:hover { background-color: #174ea6; }
        button:disabled { background-color: #bdc1c6; }

        #result { 
            margin-top: 30px; padding: 25px; border-radius: 12px; display: none; 
            white-space: pre-line; line-height: 1.6; border-left: 6px solid;
        }
        .loading { display: none; text-align: center; margin: 20px 0; font-weight: 600; color: var(--primary-color); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>Billig Global - AI Marketing Auditor</h2>
        <p>Hệ thống thẩm định kênh MKT theo tiêu chuẩn cố định</p>
    </div>
    
    <div class="section api-box">
        <label>GEMINI API KEY:</label>
        <input type="password" id="apiKey" placeholder=AIzaSyAnu9v35NRsK_3eI_bh1gv6p3l9txtDx0Q">
    </div>

    <div class="section">
        <label>TÊN CỬA HÀNG & ĐỊA CHỈ:</label>
        <input type="text" id="storeName" placeholder="VD: Cocoon Restaurant - Gartenstr 1...">
    </div>
    
    <div class="section">
        <label>DỮ LIỆU ĐẦU VÀO (Link Web, Page, Maps, Instagram...):</label>
        <textarea id="additionalInfo" placeholder="Dán thông tin khách hàng tại đây để AI đối soát..."></textarea>
    </div>

    <button id="btnCheck" onclick="evaluateWithAI()">BẮT ĐẦU PHÂN TÍCH</button>
    
    <div id="loading" class="loading">AI đang truy xuất tiêu chuẩn và kiểm tra dữ liệu...</div>
    <div id="result"></div>
</div>

<script>
    // TOÀN BỘ TIÊU CHÍ ĐÃ ĐƯỢC TRÍCH XUẤT TỪ HÌNH ẢNH CỦA BẠN
    const HE_THONG_TIEU_CHI = `
    HỆ THỐNG TIÊU CHÍ THẨM ĐỊNH MARKETING:

    1. WEBSITE:
    - Giao diện: Visual High-Quality, sử dụng ảnh thực tế của quán (không dùng ảnh stock), kích thích vị giác.
    - NAP: Tên, Địa chỉ, SĐT khớp 100% với Google Business.
    - Bản đồ: Tích hợp Google Maps API để dẫn đường ngay lập tức.
    - Đặt bàn: Quy trình tối giản dưới 1 phút, không bắt buộc đăng ký tài khoản.
    - Đa kênh: Nút liên kết Facebook, Instagram, TikTok rõ ràng; tích hợp nút Chat (WhatsApp/Messenger).
    - Digital Menu: Có tích hợp menu với hình ảnh thực tế cho từng món.
    - Tracking: Gắn mã theo dõi hành vi (Heatmap), setup mục tiêu Goal cho nút đặt bàn/gọi điện.
    - Pháp lý: Đầy đủ trang Impressum, Privacy Policy theo luật GDPR tại Đức/EU.

    2. GOOGLE BUSINESS:
    - SEO Profile: Tên hiển thị chứa [Tên quán] + [Từ khóa ngách/Địa điểm]. Danh mục chính xác. Mô tả chứa từ khóa đặc trưng.
    - Uy tín: Review trung bình > 4.3; có đánh giá mới trong 30 ngày. Phản hồi chuyên nghiệp cho cả đánh giá xấu.
    - Hình ảnh/Video: Có ít nhất 20+ ảnh thực tế. Có ảnh mới đăng trong vòng 1 tháng. Có video ngắn quay không gian.
    - Chuyển đổi: Nút Đặt bàn, Website, Gọi điện hoạt động chính xác. Menu kỹ thuật số đầy đủ giá cả.

    3. FANPAGE (FACEBOOK):
    - Profile: Tên có chứa thương hiệu + từ khóa chính. Bio dưới 150 ký tự chứa lợi thế cạnh tranh. Username đồng nhất.
    - Nội dung: Duy trì ít nhất 1-2 Reels/tuần. Cover có chữ to nêu bật nội dung. Bài đăng đầy đủ tiêu đề, nội dung, hashtag.
    - Điều hướng: Cài đặt nút "Gửi tin nhắn WhatsApp". Có link wa.me/SĐT trực tiếp.

    4. INSTAGRAM:
    - Profile: Sử dụng Location Tag chính xác cho từng bài đăng/Stories.
    - Reels/Video: Chuẩn 1080x1920 (9:16), ánh sáng tự nhiên. Cover Reels có chữ tiêu đề rõ ràng trên Grid.
    - Bài đăng: Hình ảnh nét, chuẩn tỷ lệ 1:1. Đầy đủ nội dung và hashtag.
    `;

    async function evaluateWithAI() {
        const key = document.getElementById('apiKey').value.trim();
        const name = document.getElementById('storeName').value.trim();
        const info = document.getElementById('additionalInfo').value.trim();
        const btn = document.getElementById('btnCheck');
        const resultDiv = document.getElementById('result');
        const loading = document.getElementById('loading');

        if(!key || !name || !info) { alert("Vui lòng nhập đầy đủ thông tin!"); return; }

        btn.disabled = true;
        loading.style.display = 'block';
        resultDiv.style.display = 'none';

        const prompt = `
            Bạn là chuyên gia thẩm định của Billig Global.
            Dựa trên HỆ THỐNG TIÊU CHÍ sau:
            ${HE_THONG_TIEU_CHI}

            Hãy đánh giá hiện trạng của: ${name}
            Dữ liệu cung cấp: ${info}

            Yêu cầu trả về kết quả theo cấu trúc:
            TÌNH TRẠNG: [ĐẠT / KHÔNG ĐẠT]
            - Nếu thiếu bất kỳ yếu tố cốt lõi nào (như Fanpage ghi "Chưa có"), phải đánh giá KHÔNG ĐẠT.

            CHI TIẾT ĐÁNH GIÁ:
            1. Website: (Phân tích dựa trên dữ liệu có sẵn)
            2. Google Business: (Đối soát review, hình ảnh, thông tin)
            3. Fanpage & Instagram: (Kiểm tra sự tồn tại và tối ưu)

            LỜI KHUYÊN CHO KHÁCH HÀNG: (Cần bổ sung gì gấp để triển khai MKT)
        `;

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });

            const data = await response.json();
            const aiResult = data.candidates[0].content.parts[0].text;

            resultDiv.style.display = 'block';
            resultDiv.innerText = aiResult;
            
            if (aiResult.includes("KHÔNG ĐẠT")) {
                resultDiv.style.backgroundColor = "#fff5f5";
                resultDiv.style.color = "#c62828";
                resultDiv.style.borderColor = "#c62828";
            } else {
                resultDiv.style.backgroundColor = "#f1f8e9";
                resultDiv.style.color = "#2e7d32";
                resultDiv.style.borderColor = "#2e7d32";
            }

        } catch (error) {
            alert("Lỗi: Không thể kết nối AI. Vui lòng kiểm tra API Key.");
        } finally {
            btn.disabled = false;
            loading.style.display = 'none';
        }
    }
</script>

</body>
</html>
