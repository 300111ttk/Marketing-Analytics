<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Đánh Giá Kênh Truyền Thông</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 25px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 14px; }
        input[type="text"], textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        textarea { resize: vertical; min-height: 80px; font-family: inherit; }
        button { width: 100%; padding: 14px; background-color: #3498db; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.3s; margin-top: 10px; }
        button:hover { background-color: #2980b9; }
        #result { margin-top: 25px; padding: 20px; border-radius: 8px; display: none; border-left: 5px solid; }
        .dat { background-color: #e8f5e9; color: #2e7d32; border-color: #2e7d32; }
        .khong-dat { background-color: #ffebee; color: #c62828; border-color: #c62828; }
        .status-title { font-size: 18px; margin: 0 0 10px 0; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>Kiểm Tra Điều Kiện Kênh MKT</h2>
    
    <div class="form-group">
        <label>Tên cửa hàng:</label>
        <input type="text" id="storeName" placeholder="VD: Cocoon Restaurant...">
    </div>
    <div class="form-group">
        <label>Link Website:</label>
        <input type="text" id="website" placeholder="Nhập link hoặc để trống">
    </div>
    <div class="form-group">
        <label>Link Google Business (Map):</label>
        <input type="text" id="gmb" placeholder="Nhập link hoặc để trống">
    </div>
    <div class="form-group">
        <label>Link Fanpage Facebook:</label>
        <input type="text" id="fanpage" placeholder="Nhập link hoặc để trống">
    </div>
    <div class="form-group">
        <label>Thông tin thêm:</label>
        <textarea id="additionalInfo" placeholder="Ví dụ: Chưa có fanpage, chưa chạy quảng cáo..."></textarea>
    </div>

    <button onclick="evaluateStore()">Đánh Giá Ngay</button>

    <div id="result">
        <p id="statusText" class="status-title"></p>
        <p id="descriptionText" style="white-space: pre-line;"></p>
    </div>
</div>

<script>
    function evaluateStore() {
        const name = document.getElementById('storeName').value.trim();
        const website = document.getElementById('website').value.trim();
        const gmb = document.getElementById('gmb').value.trim();
        const fanpage = document.getElementById('fanpage').value.trim();
        const info = document.getElementById('additionalInfo').value.trim().toLowerCase();

        let isDat = true;
        let reasons = [];

        // HỆ THỐNG KIỂM TRA LOGIC
        // 1. Kiểm tra link Fanpage
        if (fanpage === "" || fanpage.toLowerCase() === "chưa có") {
            isDat = false;
            reasons.push("- Thiếu Fanpage Facebook: Cần khởi tạo để chạy quảng cáo.");
        }

        // 2. Kiểm tra dựa trên ô "Thông tin thêm"
        if (info.includes("chưa có fanpage") || info.includes("thiếu fanpage")) {
            if (isDat) { // Nếu ở trên chưa bắt được
                isDat = false;
                reasons.push("- Xác nhận từ ghi chú: Cửa hàng chưa có Fanpage.");
            }
        }

        if (gmb === "") {
            isDat = false;
            reasons.push("- Thiếu Google Business: Ảnh hưởng đến khả năng tìm kiếm địa phương.");
        }

        // Hiển thị kết quả
        const resultDiv = document.getElementById('result');
        const statusText = document.getElementById('statusText');
        const descText = document.getElementById('descriptionText');

        resultDiv.style.display = 'block';

        if (isDat) {
            resultDiv.className = 'dat';
            statusText.innerText = "TÌNH TRẠNG: ĐẠT ✅";
            descText.innerText = `Cửa hàng ${name || ''} đủ điều kiện triển khai. Hệ thống ghi nhận đầy đủ các kênh truyền thông cơ bản.`;
        } else {
            resultDiv.className = 'khong-dat';
            statusText.innerText = "TÌNH TRẠNG: KHÔNG ĐẠT ❌";
            descText.innerText = `Phát hiện các điểm cần bổ sung cho ${name || 'cửa hàng'}:\n` + reasons.join("\n");
        }
    }
</script>

</body>
</html>
