<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-width=1.0">
    <title>Hệ Thống Đánh Giá Kênh Truyền Thông</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; line-height: 1.6; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input[type="text"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #3498db; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; transition: background 0.3s; }
        button:hover { background-color: #2980b9; }
        #result { margin-top: 20px; padding: 15px; border-radius: 4px; display: none; }
        .dat { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .khong-dat { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>

<div class="container">
    <h2>Kiểm Tra Điều Kiện Kênh MKT</h2>
    
    <div class="form-group">
        <label>Tên cửa hàng:</label>
        <input type="text" id="storeName" placeholder="VD: Cocoon Restaurant...">
    </div>
    <div class="form-group">
        <label>Link Website:</label>
        <input type="text" id="website" placeholder="Nhập link hoặc để trống">
    </div>
    <div class="form-group">
        <label>Link Google Business (Map):</label>
        <input type="text" id="gmb" placeholder="Nhập link hoặc để trống">
    </div>
    <div class="form-group">
        <label>Link Fanpage Facebook:</label>
        <input type="text" id="fanpage" placeholder="Nhập link hoặc để trống">
    </div>

    <button onclick="evaluateStore()">Đánh Giá Ngay</button>

    <div id="result">
        <h3 id="statusText"></h3>
        <p id="descriptionText"></p>
    </div>
</div>

<script>
    function evaluateStore() {
        // 1. Lấy dữ liệu từ form
        const name = document.getElementById('storeName').value.trim();
        const website = document.getElementById('website').value.trim();
        const gmb = document.getElementById('gmb').value.trim();
        const fanpage = document.getElementById('fanpage').value.trim();

        let isDat = true;
        let reasons = [];

        // 2. BỘ TIÊU CHÍ ĐÁNH GIÁ (Bạn có thể thay đổi luật ở đây)
        // Ví dụ: Bắt buộc phải có Fanpage và Google Map
        
        if (fanpage === "") {
            isDat = false;
            reasons.push("- Cửa hàng đang thiếu Fanpage Facebook, không thể chạy quảng cáo mạng xã hội.");
        }
        
        if (gmb === "") {
            isDat = false;
            reasons.push("- Thiếu Google Business, mất lợi thế tìm kiếm địa phương (Local SEO).");
        }

        // 3. Hiển thị kết quả
        const resultDiv = document.getElementById('result');
        const statusText = document.getElementById('statusText');
        const descText = document.getElementById('descriptionText');

        resultDiv.style.display = 'block';

        if (isDat) {
            resultDiv.className = 'dat';
            statusText.innerText = "TÌNH TRẠNG: ĐẠT ✅";
            descText.innerText = `Tuyệt vời! ${name || 'Cửa hàng'} đã có đủ các kênh cơ bản (Fanpage, Map) để bắt đầu triển khai các chiến dịch Marketing.`;
        } else {
            resultDiv.className = 'khong-dat';
            statusText.innerText = "TÌNH TRẠNG: KHÔNG ĐẠT ❌";
            descText.innerText = `Cần khắc phục các vấn đề sau đối với ${name || 'cửa hàng'}:\n` + reasons.join("\n");
        }
    }
</script>

</body>
</html>
