<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Marketing Auditor - CMO Strategic System</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        
        .fade-in { animation: fadeIn 0.6s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Tối ưu hóa xuất PDF */
        @media print {
            body { background-color: white !important; }
            .no-print { display: none !important; }
            .print-container { width: 100% !important; margin: 0 !important; padding: 0 !important; }
            .audit-card { box-shadow: none !important; border: 1px solid #e2e8f0 !important; break-inside: avoid; }
            table { break-inside: auto; }
            tr { break-inside: avoid; break-after: auto; }
            @page { margin: 1cm; size: A4; }
        }
    </style>
</head>
<body class="bg-[#F8FAFC] text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // --- Hệ thống Icon SVG nội bộ (Sửa lỗi LucideReact is not defined) ---
        const IconSparkles = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/></svg>
        );
        const IconLoader = () => (
            <svg className="animate-spin" xmlns="http://www.w3.org/2000/svg" width="50" height="50" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
        );
        const IconPrinter = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><path d="M6 9V2h12v7"/><rect x="6" y="14" width="12" height="8" rx="1"/></svg>
        );
        const IconArrowLeft = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
        );

        const App = () => {
            const [step, setStep] = useState('input');
            const [loading, setLoading] = useState(false);
            const [formData, setFormData] = useState({ brandName: '', website: '', facebook: '', description: '' });
            const [auditResult, setAuditResult] = useState(null);

            const callGeminiAI = async () => {
                if (!formData.brandName) { alert("Vui lòng nhập tên thương hiệu!"); return; }
                
                setLoading(true);
                const apiKey = "AIzaSyDrug-ZYYSvzp4qfRino-5rM-ixKiehBU4"; 
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

                const prompt = `Bạn là một Giám đốc Marketing (CMO) chuyên nghiệp. Đánh giá chiến lược Digital Marketing cho:
                - Thương hiệu: ${formData.brandName}
                - Website: ${formData.website || "Chưa có"}
                - Facebook: ${formData.facebook || "Chưa có"}
                - Mô tả: ${formData.description || "Chưa có"}

                Trả về mã JSON chuẩn xác với cấu trúc:
                {
                    "overallScore": 85,
                    "totalCriteria": 10,
                    "passed": 7,
                    "failed": 3,
                    "strategicNote": "...",
                    "categories": [
                        {
                            "name": "NỀN TẢNG WEBSITE",
                            "items": [
                                {"label": "Giao diện (UI/UX)", "status": "FAIL", "comment": "..."},
                                {"label": "Tốc độ tải trang", "status": "PASS", "comment": "..."}
                            ]
                        }
                    ]
                }`;

                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });
                    const data = await response.json();
                    const textResult = data.candidates[0].content.parts[0].text;
                    setAuditResult(JSON.parse(textResult));
                    setStep('result');
                } catch (error) {
                    alert("Lỗi kết nối AI. Hãy kiểm tra lại API Key.");
                } finally {
                    setLoading(false);
                }
            };

            const StatusPill = ({ status }) => {
                const styles = {
                    PASS: "bg-emerald-100 text-emerald-700 border-emerald-200",
                    FAIL: "bg-rose-100 text-rose-700 border-rose-200",
                    WARNING: "bg-amber-100 text-amber-700 border-amber-200"
                };
                const labels = { PASS: "ĐẠT", FAIL: "CHƯA ĐẠT", WARNING: "CẢNH BÁO" };
                return (
                    <span className={`${styles[status]} px-3 py-1 rounded-full text-[10px] font-black border uppercase`}>
                        {labels[status]}
                    </span>
                );
            };

            if (loading) return (
                <div className="min-h-screen flex flex-col items-center justify-center p-10 text-center fade-in bg-white">
                    <div className="text-indigo-600 mb-6"><IconLoader /></div>
                    <h2 className="text-2xl font-black text-slate-900 uppercase">AI đang đánh giá...</h2>
                </div>
            );

            return (
                <div className="min-h-screen p-4 md:p-10">
                    {step === 'input' && (
                        <div className="max-w-xl mx-auto pt-10 fade-in">
                            <div className="text-center mb-10">
                                <div className="inline-flex p-4 bg-indigo-600 rounded-3xl mb-6 shadow-xl text-white"><IconSparkles /></div>
                                <h1 className="text-3xl font-black text-slate-900 tracking-tighter">AI MARKETING AUDITOR</h1>
                                <p className="text-slate-500 mt-2 font-medium">Phân tích chiến lược cùng CMO AI</p>
                            </div>

                            <div className="bg-white p-8 rounded-[2.5rem] shadow-2xl border border-slate-100 space-y-6">
                                <div>
                                    <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Tên Thương hiệu *</label>
                                    <input type="text" className="w-full px-6 py-4 rounded-2xl bg-slate-50 border-2 border-transparent focus:border-indigo-500 outline-none font-semibold" placeholder="Ví dụ: Cocoon Restaurant" onChange={e => setFormData({...formData, brandName: e.target.value})} />
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <input type="url" className="px-6 py-4 rounded-2xl bg-slate-50 border-none outline-none text-sm" placeholder="Website URL" onChange={e => setFormData({...formData, website: e.target.value})} />
                                    <input type="url" className="px-6 py-4 rounded-2xl bg-slate-50 border-none outline-none text-sm" placeholder="Facebook URL" onChange={e => setFormData({...formData, facebook: e.target.value})} />
                                </div>
                                <textarea className="w-full px-6 py-4 rounded-2xl bg-slate-50 border-none outline-none text-sm h-28 resize-none" placeholder="Bối cảnh kinh doanh..." onChange={e => setFormData({...formData, description: e.target.value})} />
                                <button onClick={callGeminiAI} className="w-full bg-slate-900 text-white py-5 rounded-2xl font-black uppercase tracking-widest hover:bg-indigo-600 transition-all shadow-xl">Bắt đầu Audit AI</button>
                            </div>
                        </div>
                    )}

                    {step === 'result' && auditResult && (
                        <div className="max-w-5xl mx-auto print-container fade-in">
                            <div className="flex justify-between items-center mb-8 no-print">
                                <button onClick={() => setStep('input')} className="flex items-center gap-2 text-xs font-black text-indigo-600"><IconArrowLeft /> QUAY LẠI</button>
                                <button onClick={() => window.print()} className="flex items-center gap-2 bg-indigo-600 text-white px-6 py-3 rounded-xl text-xs font-black shadow-lg hover:bg-indigo-700 transition-all"><IconPrinter /> XUẤT PDF</button>
                            </div>

                            <div className="bg-[#0B1C3E] text-white p-10 rounded-t-[3rem] flex flex-col md:flex-row justify-between items-center shadow-2xl audit-card">
                                <div><h1 className="text-4xl font-black uppercase tracking-tight leading-none">{auditResult.brandName}</h1><p className="text-slate-400 mt-3 text-[10px] uppercase tracking-[0.3em] font-bold">DIGITAL MARKETING AUDIT • CMO AI</p></div>
                                <div className="text-center md:text-right md:border-l border-slate-700 md:pl-12">
                                    <div className="text-8xl font-black text-[#FF6B00] leading-none">{auditResult.overallScore}%</div>
                                    <p className="text-[9px] font-black uppercase tracking-widest text-slate-300 mt-2">Điểm Sức khỏe Thương hiệu</p>
                                </div>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mt-10 no-print">
                                {[
                                    {label: 'TỔNG', val: auditResult.totalCriteria, color: 'border-slate-300', text: 'text-slate-900', bg: 'bg-white'},
                                    {label: 'ĐẠT', val: auditResult.passed, color: 'border-emerald-500', text: 'text-emerald-600', bg: 'bg-emerald-50/20'},
                                    {label: 'CHƯA ĐẠT', val: auditResult.failed, color: 'border-rose-500', text: 'text-rose-600', bg: 'bg-rose-50/20'}
                                ].map((card, i) => (
                                    <div key={i} className={`p-8 rounded-[2.5rem] border-t-[10px] ${card.color} ${card.bg} shadow-md audit-card`}><p className="text-[9px] font-black text-slate-400 uppercase">{card.label}</p><p className={`text-6xl font-black mt-4 ${card.text}`}>{card.val}</p></div>
                                ))}
                            </div>

                            <div className="bg-white mt-12 rounded-[3rem] shadow-xl border border-slate-100 overflow-hidden audit-card">
                                <table className="w-full text-left">
                                    <thead><tr className="text-[10px] text-slate-400 font-black uppercase bg-slate-50/30 border-b"><th className="p-8">Hạng mục</th><th className="p-8 text-center w-40">Trạng thái</th><th className="p-8">Nhận xét</th></tr></thead>
                                    <tbody className="divide-y divide-slate-50">
                                        {auditResult.categories.map((cat, idx) => (
                                            <React.Fragment key={idx}>
                                                <tr className="bg-slate-50/80"><td colSpan="3" className="px-8 py-4 text-[11px] font-black text-indigo-900 uppercase">{idx + 1}. {cat.name}</td></tr>
                                                {cat.items.map((item, i) => (
                                                    <tr key={i} className="hover:bg-slate-50/30"><td className="px-8 py-6 font-bold text-slate-700 text-sm">{item.label}</td><td className="px-8 py-6 text-center"><StatusPill status={item.status} /></td><td className="px-8 py-6 text-[13px] text-slate-500 italic font-medium">"{item.comment}"</td></tr>
                                                ))}
                                            </React.Fragment>
                                        ))}
                                    </tbody>
                                </table>
                            </div>

                            <div className="mt-12 bg-white p-12 rounded-[3.5rem] border-l-[12px] border-[#FF6B00] shadow-2xl audit-card">
                                <h4 className="font-black text-indigo-900 text-xs uppercase mb-6 flex items-center gap-2"><IconSparkles /> CHIẾN LƯỢC ƯU TIÊN:</h4>
                                <p className="text-slate-700 text-lg leading-relaxed font-medium">{auditResult.strategicNote}</p>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
