<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Billig Global Audit Tool</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>BILLIG GLOBAL - MARKETING AUDIT</h2>
        </div>
        
        <input type="text" id="storeName" placeholder="Tên khách hàng (VD: Cocoon Neumarkt)...">
        <textarea id="storeData" rows="5" placeholder="Dán link Website, Google Map, Fanpage..."></textarea>
        
        <button id="btnRun" onclick="startAudit()">BẮT ĐẦU PHÂN TÍCH</button>

        <div id="report-area">
            <h2 id="resName" style="text-align: center;"></h2>
            <div class="score-box">
                <div><h1 id="resScore">0%</h1><p>ĐIỂM SỨC KHỎE</p></div>
                <div>
                    <p>ĐẠT: <span id="resPass" style="color:green">0</span></p>
                    <p>LỖI: <span id="resFail" style="color:red">0</span></p>
                </div>
            </div>
            <table class="audit-table">
                <thead><tr><th>Hạng mục</th><th>Trạng thái</th><th>Chi tiết</th></tr></thead>
                <tbody id="resBody"></tbody>
            </table>
            <div id="resAdvice" style="margin-top:20px; padding:15px; background:#fff9c4; border-left:5px solid #fbc02d;"></div>
            <button onclick="downloadPDF()" style="background:var(--success); margin-top:20px;">TẢI BÁO CÁO PDF</button>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
