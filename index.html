<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billig Global - Marketing Audit Tool</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 950px; margin: 0 auto; background-color: #fff; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow: hidden; }
        
        /* Header mẫu 2 */
        .main-header { background-color: #001f3f; color: #fff; padding: 25px 35px; }
        .main-header h2 { margin: 0; font-size: 22px; text-transform: uppercase; letter-spacing: 1px; }
        .main-header p { margin: 5px 0 0 0; font-size: 14px; opacity: 0.8; }

        .input-section { padding: 30px; border-bottom: 1px solid #eee; background: #fff; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; font-size: 14px; }
        button { background-color: #007bff; color: white; padding: 15px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; width: 100%; transition: 0.3s; }
        button:hover { background-color: #0056b3; }

        /* Report Content */
        #pdf-content { padding: 40px; display: none; }
        .report-store-name { text-align: center; font-size: 20px; font-weight: bold; text-transform: uppercase; margin-bottom: 30px; color: #001f3f; border-bottom: 2px solid #eee; padding-bottom: 15px; }
        
        .summary-container { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .summary-box { background-color: #f8f9fa; border-radius: 8px; padding: 20px; text-align: center; border: 1px solid #eee; }
        .score-box h1 { font-size: 54px; margin: 0; color: #007bff; }
        .stat-value { font-size: 28px; font-weight: bold; margin: 0; }
        .pass-value { color: #28a745; }
        .fail-value { color: #dc3545; }

        /* Table Style */
        .audit-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; font-size: 14px; }
        .audit-table th, .audit-table td { text-align: left; padding: 15px; border-bottom: 1px solid #eee; }
        .audit-table th { background-color: #f8f9fa; color: #555; text-transform: uppercase; font-size: 12px; }
        
        .status-tag { padding: 5px 12px; border-radius: 20px; font-weight: bold; font-size: 11px; text-transform: uppercase; }
        .status-dat { background-color: #d4edda; color: #155724; }
        .status-chua-dat { background-color: #f8d7da; color: #721c24; }
        .status-canh-bao { background-color: #fff3cd; color: #856404; }

        .action-box { background-color: #fff3cd; color: #856404; padding: 20px; border-radius: 4px; border-left: 5px solid #ffeeba; font-size: 14px; margin-top: 20px; }

        .no-pdf { padding: 0 30px 30px 30px; text-align: center; }
        .btn-pdf { background-color: #28a745; width: auto; display: inline-block; padding: 12px 40px; }
    </style>
</head>
<body>

<div class="container">
    <div class="main-header">
        <h2 id="header-shop-name">BILLIG GLOBAL AUDIT</h2>
        <p>HỆ THỐNG THẨM ĐỊNH MARKETING ĐA KÊNH CHUYÊN NGHIỆP</p>
    </div>

    <div class="input-section">
        <div class="input-group">
            <label>Tên Shop/Nhà hàng:</label>
            <input type="text" id="storeName" placeholder="VD: Cocoon Neumarkt - Gartenstr 1...">
        </div>
        <div class="input-group">
            <label>Dữ liệu khách hàng (Dán link web, Facebook, nội dung quét được...):</label>
            <textarea id="storeData" rows="6" placeholder="Dán thông tin quét được từ Website, Maps, Fanpage vào đây..."></textarea>
        </div>
        <button id="btnRun" onclick="startAudit()">PHÂN TÍCH HỆ THỐNG</button>
    </div>

    <div id="pdf-content">
        <div class="report-store-name" id="resStoreName">TÊN CỬA HÀNG</div>
        
        <div class="summary-container">
            <div class="summary-box score-box">
                <h1 id="resScore">0%</h1>
                <p style="font-size: 12px; letter-spacing: 1px;">SỨC KHỎE MARKETING</p>
            </div>
            <div class="summary-box">
                <p style="font-size: 12px; color: #777;">ĐẠT (PASS)</p>
                <p class="stat-value pass-value" id="resPass">0</p>
            </div>
            <div class="summary-box">
                <p style="font-size: 12px; color: #777;">LỖI (FAIL)</p>
                <p class="stat-value fail-value" id="resFail">0</p>
            </div>
        </div>

        <table class="audit-table">
            <thead>
                <tr>
                    <th style="width: 30%;">Hạng mục</th>
                    <th style="width: 15%;">Trạng thái</th>
                    <th style="width: 55%;">Nhận xét chi tiết</th>
                </tr>
            </thead>
            <tbody id="resBody">
                </tbody>
        </table>

        <div class="action-box">
            <strong>CHIẾN LƯỢC HÀNH ĐỘNG:</strong>
            <p id="resAdvice" style="margin: 5px 0 0 0;"></p>
        </div>
    </div>

    <div class="no-pdf" id="pdfBtnArea" style="display: none;">
        <button class="btn-pdf" onclick="downloadPDF()">XUẤT BÁO CÁO PDF</button>
    </div>
</div>

<script src="criteria.js"></script>
<script src="config.js"></script>
<script src="script.js"></script>

</body>
</html>
